version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TURN14_CLIENT_ID=${TURN14_CLIENT_ID}
      - TURN14_CLIENT_SECRET=${TURN14_CLIENT_SECRET}
      - TURN14_API_BASE=${TURN14_API_BASE}
      - TURN14_ENV=${TURN14_ENV}
      - NODE_ENV=${NODE_ENV}
      - PORT=${BACKEND_PORT}
      - SYNC_CRON_CATALOG=${SYNC_CRON_CATALOG}
      - SYNC_CRON_INVENTORY=${SYNC_CRON_INVENTORY}
      - SYNC_CRON_PRICING=${SYNC_CRON_PRICING}
      - SYNC_CRON_FITMENT=${SYNC_CRON_FITMENT}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
